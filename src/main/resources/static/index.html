<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">  <!-- Отключает запрос favicon.ico -->
    <title>Сокращатель ссылок</title>
</head>
<body style="text-align: center; margin-top: 50px;">
    <label>Введите ссылку:</label>
    <br><br>
    <input type="text" id="urlInput" size="50">
    <br><br>
    <button onclick="processUrl()">Выполнить</button>
    <br><br>
    <div id="result"></div>

    <script>
        /**
         * Асинхронная функция для обработки ссылки
         * Отправляет введенную ссылку на сервер и отображает результат
         */
        async function processUrl() {
            const url = document.getElementById('urlInput').value.trim();   // Получаем текст из поля ввода
            const resultDiv = document.getElementById('result');            // Находим блок для результата

            // Проверяем, пустое ли поле
            if (!url) {
                resultDiv.innerHTML = 'Введите ссылку!';
                return;
            }

            // Показываем индикатор загрузки
            resultDiv.innerHTML = 'Обработка...';

            try {
                // Отправляем POST запрос на сервер
                const response = await fetch('/api/shorten', {
                    method: 'POST',                                  // Указываем метод POST
                    headers: {'Content-Type': 'application/json'},   // Указываем тип данных
                    body: JSON.stringify({url: url})                 // Превращаем ссылку в JSON
                });

                // Получаем ответ от сервера
                const data = await response.json();

                if (response.ok) {          // Если статус ответа 200 (успех)
                    // Показываем успех
                    resultDiv.innerHTML = data.message + " " + data.shortURL;
                } else {                    // Если статус ошибка (400, 500 и т.д.)
                    // Показываем ошибку
                    resultDiv.innerHTML = 'Ошибка';
                }
            } catch (error) {               // Ловим ошибки сети
                // Сообщаем о проблемах с сетью
                resultDiv.innerHTML = 'Ошибка соединения';
            }
        }

        /**
         * Обработчик нажатия клавиш для поля ввода
         * Позволяет отправлять ссылку по нажатию клавиши Enter
         */
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter')
                processUrl();          // При нажатии Enter вызываем processUrl
        });
    </script>
</body>
</html>
